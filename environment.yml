name: hea_transformer
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - jupyter>=1.0
  - nbformat>=5.9
  - nbconvert>=7.0
  - pip
  - pip:
      - torch>=2.0          # optional: for src_torch/ production backend
      - torchvision>=0.15   # optional: for microscopy CNN branch
